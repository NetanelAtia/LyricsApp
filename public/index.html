<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>%WEB_TITLE%</title>

    <!-- Makes "Add to Home Screen" launch as a standalone app instead of a
         plain Safari bookmark — required before the status-bar-style tag
         below has any effect at all. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LyricsApp" />

    <!-- Home-screen icons: apple-touch-icon for iOS Safari, manifest icons
         for Android Chrome. Absolute paths because the site is served from
         the /LyricsApp/ base path on GitHub Pages. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/LyricsApp/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/LyricsApp/manifest.json" />
    <meta name="theme-color" content="#0f0f1a" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        /* 100% alone stops short of the real screen height in standalone
           iOS with viewport-fit=cover (it excludes the safe areas) —
           100dvh is the actual visible viewport including them, so the
           app's own content (e.g. a scrolling list) extends all the way
           down instead of leaving a blank gap below it. */
        height: 100dvh;
        background-color: #0f0f1a;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        height: 100dvh;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
